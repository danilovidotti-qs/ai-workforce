<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Workforce</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; color: #fff; }
    .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 2rem; }
    .container { width: 100%; max-width: 720px; }

    /* ── Form ── */
    .form-group { margin-bottom: 1rem; }

    label {
      display: block; font-size: 0.75rem; color: #666;
      margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.05em;
    }

    select, textarea, input[type="text"] {
      width: 100%; background: #141414; border: 1px solid #2a2a2a;
      color: #e0e0e0; border-radius: 6px; padding: 0.6rem 0.75rem;
      font-family: inherit; font-size: 0.9rem;
    }

    select:focus, textarea:focus, input[type="text"]:focus { outline: none; border-color: #444; }
    textarea { resize: vertical; min-height: 80px; }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex; margin-bottom: 1rem;
      border: 1px solid #2a2a2a; border-radius: 6px; overflow: hidden;
    }
    .mode-toggle label {
      flex: 1; text-align: center; padding: 0.5rem; cursor: pointer;
      font-size: 0.8rem; margin: 0; color: #666; transition: all 0.2s;
    }
    .mode-toggle input { display: none; }
    .mode-toggle label:has(input:checked) { background: #2a2a2a; color: #fff; }

    /* ── Buttons ── */
    button {
      background: #fff; color: #000; border: none; border-radius: 6px;
      padding: 0.6rem 1.5rem; font-family: inherit; font-size: 0.9rem;
      font-weight: 600; cursor: pointer; transition: opacity 0.2s; width: 100%;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    button.secondary { background: #2a2a2a; color: #e0e0e0; }
    button.approve { background: #22c55e; color: #000; }
    button.danger { background: #ef4444; color: #fff; }
    button.small { width: auto; font-size: 0.75rem; padding: 0.35rem 0.75rem; }

    /* ── Progress bar ── */
    .progress-bar {
      width: 100%; height: 4px; background: #1a1a1a; border-radius: 2px;
      margin-top: 1rem; margin-bottom: 0.5rem; overflow: hidden; display: none;
    }
    .progress-bar.active { display: block; }
    .progress-fill {
      height: 100%; background: #22c55e; border-radius: 2px;
      transition: width 0.5s ease;
    }
    .progress-label {
      font-size: 0.7rem; color: #666; margin-bottom: 0.5rem; display: none;
    }
    .progress-label.active { display: block; }

    /* ── Accordion phases ── */
    .pipeline { margin-top: 0.5rem; display: none; }
    .pipeline.active { display: block; }

    .phase {
      border: 1px solid #1a1a1a; border-radius: 6px;
      margin-bottom: 0.5rem; overflow: hidden;
    }

    .phase-header {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.65rem 0.75rem; cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .phase-header:hover { background: #141414; }

    .phase-icon {
      width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
    }
    .phase-icon.pending { background: #333; }
    .phase-icon.running { background: #f59e0b; animation: pulse 1.5s infinite; }
    .phase-icon.done { background: #22c55e; }
    .phase-icon.error { background: #ef4444; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .phase-title { font-size: 0.85rem; font-weight: 600; color: #fff; flex: 1; }
    .phase-badge {
      font-size: 0.65rem; padding: 0.15rem 0.5rem; border-radius: 3px;
      background: #1a1a1a; color: #888;
    }

    .phase-chevron {
      color: #444; font-size: 0.7rem; transition: transform 0.2s;
    }
    .phase.expanded .phase-chevron { transform: rotate(90deg); }

    .phase-body {
      max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
      border-top: 1px solid transparent;
    }
    .phase.expanded .phase-body {
      max-height: 2000px; border-top-color: #1a1a1a;
    }

    .phase-content {
      padding: 0.75rem;
      font-size: 0.8rem; color: #999; line-height: 1.6;
    }

    /* ── Phase log entries ── */
    .phase-log { display: flex; flex-direction: column; gap: 0.3rem; }
    .log-entry {
      font-size: 0.8rem; color: #999; line-height: 1.5;
      padding: 0.1rem 0;
    }
    .log-entry.active {
      color: #f59e0b;
    }
    .log-entry.active::before {
      content: "";
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #f59e0b;
      margin-right: 0.4rem;
      animation: pulse 1.5s infinite;
      vertical-align: middle;
    }

    /* ── Editable subtasks ── */
    .subtask-card {
      background: #141414; border: 1px solid #2a2a2a; border-radius: 6px;
      padding: 0.6rem 0.75rem; margin-bottom: 0.4rem;
    }

    .subtask-card .subtask-header {
      display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem;
    }

    .subtask-card .subtask-id {
      font-size: 0.7rem; color: #666; font-weight: 600;
    }

    .subtask-card .subtask-remove {
      margin-left: auto; cursor: pointer; color: #555; font-size: 0.75rem;
    }
    .subtask-card .subtask-remove:hover { color: #f87171; }

    .subtask-card input, .subtask-card textarea {
      font-size: 0.8rem; padding: 0.35rem 0.5rem; margin-bottom: 0.25rem;
      background: #0a0a0a;
    }

    .subtask-card textarea { min-height: 40px; }

    .subtask-actions {
      margin-top: 0.5rem; display: flex; gap: 0.5rem;
    }

    /* ── Approve bar ── */
    .approve-bar {
      margin-top: 0.75rem; display: none; text-align: center;
    }
    .approve-bar.active { display: flex; gap: 0.5rem; }

    /* ── Result ── */
    .result-content {
      background: #141414; border: 1px solid #2a2a2a; border-radius: 6px;
      padding: 0.75rem; font-size: 0.8rem; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
      max-height: 300px; overflow-y: auto;
    }

    .merge-status { margin-top: 0.5rem; display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .merge-badge {
      font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 4px;
      background: #14532d; color: #4ade80;
    }
    .merge-badge.failed { background: #450a0a; color: #f87171; }

    /* ── Error ── */
    .error-msg {
      margin-top: 0.75rem; background: #1c0a0a; border: 1px solid #3b1111;
      border-radius: 6px; padding: 0.6rem 0.75rem; color: #f87171;
      font-size: 0.8rem; display: none;
    }
    .error-msg.active { display: block; }

    /* ── Run history ── */
    .history { margin-top: 2rem; display: none; }
    .history.active { display: block; }

    .history-header {
      font-size: 0.75rem; color: #666; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 0.5rem;
    }

    .run-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.5rem 0.65rem; border: 1px solid #1a1a1a;
      border-radius: 6px; margin-bottom: 0.3rem; cursor: pointer;
    }
    .run-item:hover { border-color: #333; }

    .run-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .run-dot.completed { background: #22c55e; }
    .run-dot.failed { background: #ef4444; }
    .run-dot.running { background: #f59e0b; animation: pulse 1.5s infinite; }
    .run-dot.awaiting_approval { background: #eab308; }
    .run-dot.stopped { background: #f59e0b; }

    .run-info { flex: 1; min-width: 0; }
    .run-task {
      font-size: 0.8rem; color: #ccc; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .run-meta { font-size: 0.65rem; color: #555; margin-top: 0.1rem; }

    /* ── Model config ── */
    .model-config {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      margin-bottom: 1.25rem; justify-content: center;
    }
    .model-chip {
      font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 4px;
      background: #141414; border: 1px solid #2a2a2a; color: #888;
    }
    .model-chip span { color: #ccc; font-weight: 600; }
  </style>
</head>
<body>

<div class="container">
  <h1>AI Workforce</h1>
  <p class="subtitle">Autonomous multi-agent coding orchestrator</p>
  <div class="model-config" id="modelConfig"></div>

  <form id="taskForm">
    <div class="form-group">
      <label>Project</label>
      <select id="project" required>
        <option value="" disabled selected>Loading...</option>
      </select>
    </div>

    <div class="form-group">
      <label>Task</label>
      <textarea id="task" placeholder="e.g. Add user authentication with JWT tokens" required></textarea>
    </div>

    <div class="mode-toggle">
      <label><input type="radio" name="mode" value="auto" checked><span>Auto</span></label>
      <label><input type="radio" name="mode" value="supervised"><span>Supervised</span></label>
    </div>

    <div style="display:flex;gap:0.5rem;">
      <button type="submit" id="submitBtn" style="flex:1;">Run</button>
      <button type="button" id="stopBtn" class="danger" style="flex:0;display:none;min-width:80px;" onclick="stopCurrentRun()">Stop</button>
    </div>
  </form>

  <div class="error-msg" id="errorMsg"></div>

  <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>

  <div class="pipeline" id="pipeline"></div>

  <div class="approve-bar" id="approveBar">
    <button class="approve" onclick="approveCurrentRun()">Approve & Execute</button>
    <button class="secondary" onclick="approveCurrentRun()">Execute with changes</button>
  </div>

  <div class="history" id="history">
    <p class="history-header">Recent Runs</p>
    <div id="runList"></div>
  </div>
</div>

<script>
const PHASE_INFO = {
  scanner_scan:      { label: "Scanner — Analysing",     detail: "Reading project structure",   step: 1 },
  architect_plan:    { label: "Architect — Planning",    detail: "Breaking task into subtasks", step: 2 },
  lead_dev_assign:   { label: "Lead Dev — Assign",       detail: "Creating worktrees",          step: 3 },
  execute_worker:    { label: "Worker — Coding",         detail: "Writing code",                step: 4 },
  execute_sequential:{ label: "Worker — Coding",         detail: "Writing code (sequential)",   step: 4 },
  lead_dev_review:   { label: "Lead Dev — Review",       detail: "Reviewing diffs",             step: 5 },
  lead_dev_merge:    { label: "Lead Dev — Merge",        detail: "Merging branches",            step: 6 },
};

const KNOWN_PHASES = new Set(Object.keys(PHASE_INFO));
const TOTAL_STEPS = 6;

let phases = {};
let currentRunId = null;
let editableSubtasks = [];
let completedSteps = 0;
let currentAbortController = null;

// ── Phase accordion ──

function getPhaseEl(node) {
  const key = node === "execute_sequential" ? "execute_worker" : node;
  if (phases[key]) return { key, el: phases[key] };

  const info = PHASE_INFO[key] || { label: node, detail: "" };
  const div = document.createElement("div");
  div.className = "phase";
  div.id = `phase-${key}`;
  div.innerHTML = `
    <div class="phase-header" onclick="togglePhase('${key}')">
      <div class="phase-icon pending" id="icon-${key}"></div>
      <span class="phase-title">${info.label}</span>
      <span class="phase-badge" id="badge-${key}"></span>
      <span class="phase-chevron">&#9654;</span>
    </div>
    <div class="phase-body">
      <div class="phase-content" id="content-${key}"></div>
    </div>
  `;
  document.getElementById("pipeline").appendChild(div);
  phases[key] = div;
  return { key, el: div };
}

function togglePhase(key) {
  const el = phases[key];
  if (el) el.classList.toggle("expanded");
}

function updateProgress(node, status) {
  const info = PHASE_INFO[node];
  if (!info) return;
  const bar = document.getElementById("progressBar");
  const fill = document.getElementById("progressFill");
  const label = document.getElementById("progressLabel");
  bar.classList.add("active");
  label.classList.add("active");

  if (status === "started") {
    label.textContent = `Step ${info.step}/${TOTAL_STEPS}: ${info.detail}...`;
    fill.style.width = `${((info.step - 0.5) / TOTAL_STEPS) * 100}%`;
  } else if (status === "completed") {
    completedSteps = Math.max(completedSteps, info.step);
    fill.style.width = `${(completedSteps / TOTAL_STEPS) * 100}%`;
    label.textContent = `Step ${info.step}/${TOTAL_STEPS}: ${info.label} — done`;
  }
}

function updatePhase(node, status, extra = {}) {
  // Skip internal LangGraph nodes (routing, RunnableSequence, etc.)
  if (!KNOWN_PHASES.has(node)) return;

  const pipeline = document.getElementById("pipeline");
  pipeline.classList.add("active");

  updateProgress(node, status);

  const { key, el } = getPhaseEl(node);
  const icon = document.getElementById(`icon-${key}`);
  const badge = document.getElementById(`badge-${key}`);
  const content = document.getElementById(`content-${key}`);

  if (status === "started") {
    icon.className = "phase-icon running";
    badge.textContent = "running";
    el.classList.add("expanded");
    // Show default activity message when phase starts
    const info = PHASE_INFO[node] || {};
    if (!content.innerHTML.trim()) {
      content.innerHTML = `<div class="phase-log"><div class="log-entry active">${info.detail || "Processing"}...</div></div>`;
    } else {
      // Append a running indicator
      appendLog(content, `${info.detail || "Processing"}...`, true);
    }
  } else if (status === "completed") {
    icon.className = "phase-icon done";
    badge.textContent = "done";
    // Mark running log entries as done
    content.querySelectorAll(".log-entry.active").forEach(el => {
      el.classList.remove("active");
      el.style.color = "#4ade80";
    });
    // Auto-collapse completed, but keep architect expanded in supervised mode
    const currentMode = document.querySelector('input[name="mode"]:checked')?.value;
    const keepOpen = (currentMode === "supervised" && key === "architect_plan");
    if (!keepOpen) setTimeout(() => el.classList.remove("expanded"), 800);
  }

  // Subtasks (editable in supervised mode)
  if (extra.subtasks) {
    editableSubtasks = extra.subtasks;
    const mode = document.querySelector('input[name="mode"]:checked')?.value;
    if (mode === "supervised" && node === "architect_plan") {
      content.innerHTML = renderEditableSubtasks(extra.subtasks);
      badge.textContent = `${extra.subtasks.length} subtasks`;
    } else {
      content.innerHTML = extra.subtasks.map(s =>
        `<div class="subtask-card">
          <div class="subtask-header">
            <span class="subtask-id">${s.id}</span>
            <span style="font-size:0.65rem;color:${s.status==='done'?'#4ade80':'#888'};margin-left:auto;">${s.status}</span>
          </div>
          <div>${s.description}</div>
          <div style="color:#555;font-size:0.7rem;margin-top:0.2rem;">Files: ${(s.files_touched||[]).join(", ") || "—"}</div>
        </div>`
      ).join("");
      badge.textContent = `${extra.subtasks.length} subtasks`;
    }
  }

  if (extra.overlap_detected !== undefined) {
    const tag = extra.overlap_detected ? "sequential" : "parallel";
    badge.textContent += ` · ${tag}`;
    appendLog(content, `Execution mode: <strong>${tag}</strong>`);
  }

  if (extra.worktrees) {
    content.innerHTML = `<div class="phase-log">` + extra.worktrees.map(wt =>
      `<div class="log-entry" style="display:flex;align-items:center;gap:0.4rem;">
        <span style="color:#4ade80;">●</span>
        <span style="color:#ccc;font-weight:600;">${wt.id}</span>
        <span style="color:#666;">→</span>
        <span>${wt.status}</span>
      </div>`
    ).join("") + `</div>`;
    badge.textContent = `${extra.worktrees.length} worktrees`;
  }

  if (extra.review_feedback && Object.keys(extra.review_feedback).length > 0) {
    const issues = Object.keys(extra.review_feedback).length;
    content.innerHTML = Object.entries(extra.review_feedback).map(([wt, fb]) =>
      `<div class="subtask-card">
        <div class="subtask-header"><span class="subtask-id">${wt}</span><span style="color:#f59e0b;font-size:0.65rem;margin-left:auto;">needs changes</span></div>
        <div style="margin-top:0.3rem;white-space:pre-wrap;">${escapeHtml(fb.substring(0,500))}</div>
      </div>`
    ).join("");
    badge.textContent = `${issues} issues · round ${extra.review_round || "?"}`;
    icon.className = "phase-icon running";
  } else if (extra.review_round && key === "lead_dev_review") {
    content.innerHTML = `<div class="log-entry" style="color:#4ade80;">✓ All worktrees approved</div>`;
    badge.textContent = "approved";
  }

  if (extra.merge_results) {
    content.innerHTML = `<div class="phase-log">` + Object.entries(extra.merge_results).map(([wt, st]) => {
      const ok = st === "success";
      return `<div class="log-entry" style="display:flex;align-items:center;gap:0.4rem;">
        <span style="color:${ok ? '#4ade80' : '#f87171'};">${ok ? '✓' : '✗'}</span>
        <span style="color:#ccc;font-weight:600;">${wt}</span>
        <span style="color:${ok ? '#4ade80' : '#f87171'};">${st}</span>
      </div>`;
    }).join("") + `</div>`;
    badge.textContent = Object.values(extra.merge_results).every(s => s === "success") ? "merged" : "conflicts";
  }

  if (extra.final_output) {
    content.innerHTML = `<div class="result-content">${escapeHtml(extra.final_output)}</div>`;
    badge.textContent = "complete";
    el.classList.add("expanded");
  }
}

function appendLog(container, html, isActive = false) {
  let log = container.querySelector(".phase-log");
  if (!log) {
    log = document.createElement("div");
    log.className = "phase-log";
    container.appendChild(log);
  }
  const entry = document.createElement("div");
  entry.className = `log-entry${isActive ? " active" : ""}`;
  entry.innerHTML = html;
  log.appendChild(entry);
}

// ── Editable subtasks ──

function renderEditableSubtasks(subtasks) {
  return subtasks.map((s, i) => `
    <div class="subtask-card" data-index="${i}">
      <div class="subtask-header">
        <span class="subtask-id">${s.id}</span>
        <span class="subtask-remove" onclick="removeSubtask(${i})">remove</span>
      </div>
      <textarea onchange="updateSubtask(${i},'description',this.value)">${s.description}</textarea>
      <input type="text" value="${(s.files_touched||[]).join(', ')}"
             onchange="updateSubtask(${i},'files_touched',this.value)"
             placeholder="file1.py, file2.py">
    </div>
  `).join("") + `
    <div class="subtask-actions">
      <button class="small secondary" onclick="addSubtask()">+ Add subtask</button>
    </div>
  `;
}

function updateSubtask(index, field, value) {
  if (field === "files_touched") {
    editableSubtasks[index][field] = value.split(",").map(f => f.trim()).filter(Boolean);
  } else {
    editableSubtasks[index][field] = value;
  }
}

function removeSubtask(index) {
  editableSubtasks.splice(index, 1);
  const content = document.getElementById("content-architect_plan");
  if (content) content.innerHTML = renderEditableSubtasks(editableSubtasks);
}

function addSubtask() {
  const id = `subtask-${editableSubtasks.length + 1}`;
  editableSubtasks.push({ id, description: "", files_touched: [], status: "pending", result: "", assigned_worktree: "" });
  const content = document.getElementById("content-architect_plan");
  if (content) content.innerHTML = renderEditableSubtasks(editableSubtasks);
}

// ── Stop ──

async function stopCurrentRun() {
  if (!currentRunId) return;
  const stopBtn = document.getElementById("stopBtn");
  stopBtn.disabled = true;
  stopBtn.textContent = "Stopping...";
  try {
    // Signal backend to cancel
    await fetch(`/api/runs/${currentRunId}/stop`, { method: "POST" });
    // Abort the SSE connection so it doesn't hang waiting for the next event
    if (currentAbortController) {
      currentAbortController.abort();
      currentAbortController = null;
    }
  } catch (e) {}
  // Immediately update UI since we've killed the connection
  setRunning(false);
  const errDiv = document.getElementById("errorMsg");
  errDiv.innerHTML = `Run stopped by user <button class="small secondary" style="display:inline;margin-left:0.5rem;" onclick="resumeRun('${currentRunId}')">Resume</button>`;
  errDiv.classList.add("active");
  loadHistory();
}

function setRunning(running) {
  const stopBtn = document.getElementById("stopBtn");
  stopBtn.style.display = running ? "block" : "none";
  stopBtn.disabled = false;
  stopBtn.textContent = "Stop";
}

// ── Reset ──

function resetPipeline() {
  phases = {};
  editableSubtasks = [];
  completedSteps = 0;
  document.getElementById("pipeline").innerHTML = "";
  document.getElementById("pipeline").classList.remove("active");
  document.getElementById("approveBar").classList.remove("active");
  document.getElementById("errorMsg").classList.remove("active");
  document.getElementById("progressBar").classList.remove("active");
  document.getElementById("progressLabel").classList.remove("active");
  document.getElementById("progressFill").style.width = "0%";
}

// ── SSE handler ──

async function handleSSEStream(res) {
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";

  while (true) {
    let result;
    try {
      result = await reader.read();
    } catch (e) {
      // Stream aborted (e.g. by stop action)
      break;
    }
    const { done, value } = result;
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split("\n");
    buffer = lines.pop();

    let eventType = "";
    for (const line of lines) {
      if (line.startsWith("event: ")) {
        eventType = line.slice(7).trim();
      } else if (line.startsWith("data: ") && eventType) {
        try {
          const data = JSON.parse(line.slice(6));
          if (eventType === "started") {
            currentRunId = data.run_id;
            setRunning(true);
          } else if (eventType === "done") {
            setRunning(false);
            document.getElementById("progressFill").style.width = "100%";
            document.getElementById("progressLabel").textContent = "Completed";
          } else if (eventType === "stopped") {
            setRunning(false);
            const errDiv = document.getElementById("errorMsg");
            errDiv.textContent = data.message || "Run stopped";
            errDiv.classList.add("active");
            if (data.run_id) {
              errDiv.innerHTML += ` <button class="small secondary" style="display:inline;margin-left:0.5rem;" onclick="resumeRun('${data.run_id}')">Resume</button>`;
            }
          } else if (eventType === "awaiting_approval") {
            currentRunId = data.run_id;
            setRunning(false);
            document.getElementById("approveBar").classList.add("active");
          } else if (eventType === "phase") {
            updatePhase(data.node, data.status, data);
          } else if (eventType === "error") {
            setRunning(false);
            const errDiv = document.getElementById("errorMsg");
            errDiv.textContent = data.message;
            errDiv.classList.add("active");
            if (data.run_id) {
              errDiv.innerHTML += ` <button class="small secondary" style="display:inline;margin-left:0.5rem;" onclick="resumeRun('${data.run_id}')">Resume</button>`;
            }
          }
        } catch (e) {}
        eventType = "";
      }
    }
  }
}

// ── Approve ──

async function approveCurrentRun() {
  if (!currentRunId) return;
  document.getElementById("approveBar").classList.remove("active");

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "Executing...";

  try {
    const body = editableSubtasks.length > 0
      ? JSON.stringify({ subtasks: editableSubtasks })
      : "{}";

    currentAbortController = new AbortController();
    const res = await fetch(`/api/runs/${currentRunId}/approve`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body,
      signal: currentAbortController.signal,
    });
    await handleSSEStream(res);
  } catch (err) {
    if (err.name !== "AbortError") {
      const errDiv = document.getElementById("errorMsg");
      errDiv.textContent = `Connection error: ${err.message}`;
      errDiv.classList.add("active");
    }
  }

  btn.disabled = false;
  btn.textContent = "Run";
  loadHistory();
}

// ── Resume ──

async function resumeRun(runId) {
  resetPipeline();
  currentRunId = runId;
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "Resuming...";

  try {
    currentAbortController = new AbortController();
    const res = await fetch(`/api/runs/${runId}/resume`, {
      method: "POST",
      signal: currentAbortController.signal,
    });
    await handleSSEStream(res);
  } catch (err) {
    if (err.name !== "AbortError") {
      const errDiv = document.getElementById("errorMsg");
      errDiv.textContent = `Connection error: ${err.message}`;
      errDiv.classList.add("active");
    }
  }

  btn.disabled = false;
  btn.textContent = "Run";
  loadHistory();
}

// ── Submit ──

document.getElementById("taskForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  resetPipeline();

  const project = document.getElementById("project").value;
  const task = document.getElementById("task").value;
  const mode = document.querySelector('input[name="mode"]:checked').value;
  const btn = document.getElementById("submitBtn");

  btn.disabled = true;
  btn.textContent = mode === "supervised" ? "Planning..." : "Running...";

  try {
    currentAbortController = new AbortController();
    const res = await fetch("/api/run/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ project, task, mode }),
      signal: currentAbortController.signal,
    });
    await handleSSEStream(res);
  } catch (err) {
    if (err.name !== "AbortError") {
      const errDiv = document.getElementById("errorMsg");
      errDiv.textContent = `Connection error: ${err.message}`;
      errDiv.classList.add("active");
    }
  }

  if (!document.getElementById("approveBar").classList.contains("active")) {
    btn.disabled = false;
    btn.textContent = "Run";
  }
  loadHistory();
});

// ── History ──

async function loadHistory() {
  try {
    const res = await fetch("/api/runs");
    const data = await res.json();
    const historyDiv = document.getElementById("history");
    const listDiv = document.getElementById("runList");

    if (!data.runs || data.runs.length === 0) {
      historyDiv.classList.remove("active");
      return;
    }

    historyDiv.classList.add("active");
    listDiv.innerHTML = data.runs.map(r => {
      const canResume = r.status === "failed" || r.status === "running" || r.status === "stopped";
      const canApprove = r.status === "awaiting_approval";
      const time = new Date(r.created_at).toLocaleString();
      let actions = "";
      if (canResume) actions = `<button class="small secondary" onclick="event.stopPropagation();resumeRun('${r.run_id}')">Resume</button>`;
      if (canApprove) actions = `<button class="small approve" onclick="event.stopPropagation();viewAndApprove('${r.run_id}')">Review</button>`;
      return `
        <div class="run-item" onclick="viewRun('${r.run_id}')">
          <div class="run-dot ${r.status}"></div>
          <div class="run-info">
            <div class="run-task">${escapeHtml(r.task)}</div>
            <div class="run-meta">${r.project} &middot; ${time} &middot; ${r.status}</div>
          </div>
          ${actions}
        </div>`;
    }).join("");
  } catch (e) {}
}

async function viewRun(runId) {
  try {
    const res = await fetch(`/api/runs/${runId}`);
    const run = await res.json();
    resetPipeline();
    document.getElementById("pipeline").classList.add("active");

    const state = run.state;
    if (state.subtasks?.length) {
      updatePhase("architect_plan", "completed", { subtasks: state.subtasks, overlap_detected: state.overlap_detected });
    }
    if (state.worktrees?.length) {
      updatePhase("lead_dev_assign", "completed", { worktrees: state.worktrees });
    }
    if (state.final_output) {
      updatePhase("lead_dev_merge", "completed", { final_output: state.final_output, merge_results: state.merge_results });
    }
  } catch (e) {}
}

async function viewAndApprove(runId) {
  await viewRun(runId);
  currentRunId = runId;
  document.getElementById("approveBar").classList.add("active");
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

// ── Load projects ──

async function loadProjects() {
  try {
    const res = await fetch("/api/projects");
    const data = await res.json();
    const select = document.getElementById("project");
    if (data.projects.length === 0) {
      select.innerHTML = '<option value="" disabled selected>No projects in /projects</option>';
      return;
    }
    select.innerHTML = '<option value="" disabled selected>Select a project</option>';
    data.projects.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p;
      opt.textContent = p;
      select.appendChild(opt);
    });
  } catch (e) {
    document.getElementById("project").innerHTML =
      '<option value="" disabled selected>Error loading projects</option>';
  }
}

// ── Load model config ──

async function loadModelConfig() {
  try {
    const res = await fetch("/api/config");
    const data = await res.json();
    const div = document.getElementById("modelConfig");
    div.innerHTML = Object.entries(data.roles).map(([role, model]) =>
      `<div class="model-chip">${role}: <span>${model}</span></div>`
    ).join("");
  } catch (e) {}
}

// ── Init ──
loadProjects();
loadHistory();
loadModelConfig();
</script>
